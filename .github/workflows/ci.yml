name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  id-token: write

env:
  ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL }}

jobs:
  test:
    name: Test - Node ${{ matrix.node }}
    # Internal Artifactory runners for org builds; forks fall back to GitHub-hosted
    runs-on: ${{ github.event.pull_request.head.repo.fork && 'ubuntu-latest' || 'ubuntu-x64' }}
    timeout-minutes: 20
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Forks have no secret to auth Artifactory; they resolve from public npm.
      - name: Artifactory OIDC Auth
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: ./.github/actions/artifactory-oidc

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
